<!DOCTYPE html>
<html>
<head>
  <title>Santosh Menon | Paintings</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    header, footer {
      background: #000;
      text-align: center;
      padding: 20px;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    /* GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: 0.3s;
    }

    .card img:hover {
      transform: scale(1.05);
    }

    .card h3 {
      text-align: center;
      padding: 10px;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .lightbox:target {
      display: flex;
    }

    @media (max-width: 800px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Santosh Menon's Paintings 🎨</h1>
  </header>

  <div class="hero">
    <p>Click any painting to view fullscreen</p>
  </div>

  <!-- GALLERY -->
  <div class="gallery">

    <a href="#img1" class="card">
      <img src="20260404_065908.jpg">
      <h3>Artwork 1</h3>
    </a>

    <a href="#img2" class="card">
      <img src="Krishna.jpg">
      <h3>Krishna</h3>
    </a>

    <a href="#img3" class="card">
      <img src="kalki.jpg">
      <h3>Kalki</h3>
    </a>

  </div>

  <!-- LIGHTBOX POPUPS -->
  <div id="img1" class="lightbox">
    <a href="#"><img src="20260404_065908.jpg"></a>
  </div>

  <div id="img2" class="lightbox">
    <a href="#"><img src="Krishna.jpg"></a>
  </div>

  <div id="img3" class="lightbox">
    <a href="#"><img src="kalki.jpg"></a>
  </div>

  <footer>
    <p>© 2026 Santosh Menon</p>
  </footer>

</body>
</html>
