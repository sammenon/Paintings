<!DOCTYPE html>
<html>
<head>
  <title>Santosh Menon | Paintings</title>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f5f5f5; }
    header, footer { background: #000; text-align: center; padding: 20px; }
    .hero { text-align: center; padding: 40px 20px; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      padding: 12px;
      text-decoration: none;
      color: white;
    }

    .card img {
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
      border-radius: 8px;
      display: block;
      transition: transform 0.3s ease;
    }

    .card:hover img { transform: scale(1.03); }

    .card h3 { text-align: center; margin: 12px 0 4px; }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      overflow: auto;
      text-align: center;
      padding: 60px 20px;
      box-sizing: border-box;
    }

    .lightbox:target { display: block; }

    .lightbox img {
      max-width: 95%;
      height: auto;
      border-radius: 10px;
      margin-top: 20px;
    }

    .close {
      color: white;
      font-size: 34px;
      position: fixed;
      top: 20px;
      right: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .gallery { grid-template-columns: 1fr; padding: 20px; }
    }
  </style>
</head>

<body>

  <header>
    <h1>Santosh Menon's Paintings 🎨</h1>
  </header>

  <section class="hero">
    <h2>My Art Gallery</h2>
    <p>Click any painting to view fullscreen.</p>
  </section>

  <section class="gallery">
    <a href="#img1" class="card"><img src="20260404_065908.jpg"><h3>Artwork 1</h3></a>
    <a href="#img2" class="card"><img src="Ganga.jpeg"><h3>Ganga</h3></a>
    <a href="#img3" class="card"><img src="Krishna.jpg"><h3>Krishna</h3></a>
    <a href="#img4" class="card"><img src="Matsyaavatar.jpeg"><h3>Matsya Avatar</h3></a>
    <a href="#img5" class="card"><img src="Narasimhamurthy.jpeg"><h3>Narasimha Murthy</h3></a>
    <a href="#img6" class="card"><img src="Shri Ram Hanuman.jpeg"><h3>Shri Ram Hanuman</h3></a>
    <a href="#img7" class="card"><img src="Vanamali Krishna.jpeg"><h3>Vanamali Krishna</h3></a>
    <a href="#img8" class="card"><img src="Varahamurthy.jpeg"><h3>Varaha Murthy</h3></a>
    <a href="#img9" class="card"><img src="kalki.jpg"><h3>Kalki</h3></a>
  </section>

  <div id="img1" class="lightbox"><a href="#" class="close">×</a><img src="20260404_065908.jpg"></div>
  <div id="img2" class="lightbox"><a href="#" class="close">×</a><img src="Ganga.jpeg"></div>
  <div id="img3" class="lightbox"><a href="#" class="close">×</a><img src="Krishna.jpg"></div>
  <div id="img4" class="lightbox"><a href="#" class="close">×</a><img src="Matsyaavatar.jpeg"></div>
  <div id="img5" class="lightbox"><a href="#" class="close">×</a><img src="Narasimhamurthy.jpeg"></div>
  <div id="img6" class="lightbox"><a href="#" class="close">×</a><img src="Shri Ram Hanuman.jpeg"></div>
  <div id="img7" class="lightbox"><a href="#" class="close">×</a><img src="Vanamali Krishna.jpeg"></div>
  <div id="img8" class="lightbox"><a href="#" class="close">×</a><img src="Varahamurthy.jpeg"></div>
  <div id="img9" class="lightbox"><a href="#" class="close">×</a><img src="kalki.jpg"></div>

  <footer>
    <p>© 2026 Santosh Menon</p>
    <p>Made with ❤️ and watercolor</p>
  </footer>

</body>
</html>
