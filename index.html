<!DOCTYPE html>
<html>
<head>
  <title>Santosh Menon | Paintings</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f5f5f5; }
    header, footer { background: #000; text-align: center; padding: 20px; }
    .hero { text-align: center; padding: 40px 20px; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px;
      color: white;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
      border-radius: 8px;
      display: block;
    }

    .card h3 { text-align: center; margin: 12px 0 4px; }

    .details {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .tag {
      display: block;
      width: fit-content;
      margin: 0 auto 8px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #1f7a3f;
      color: white;
    }

    .buy {
      display: block;
      text-align: center;
      width: fit-content;
      margin: 8px auto 0;
      padding: 8px 14px;
      border-radius: 8px;
      background: white;
      color: black;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: auto;
      padding: 60px 20px;
      box-sizing: border-box;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 10px;
    }

    .close, .prev, .next {
      position: fixed;
      color: white;
      font-size: 38px;
      cursor: pointer;
      user-select: none;
      text-decoration: none;
    }

    .close { top: 20px; right: 30px; }
    .prev { left: 30px; top: 50%; }
    .next { right: 30px; top: 50%; }

    @media (max-width: 800px) {
      .gallery { grid-template-columns: 1fr; padding: 20px; }
      .prev, .next { font-size: 30px; }
    }
  </style>
</head>

<body>

<header>
  <h1>Santosh Menon's Paintings 🎨</h1>
</header>

<section class="hero">
  <h2>My Art Gallery</h2>
  <p>Paintings auto-loaded from GitHub. Click any painting to view fullscreen.</p>
</section>

<section id="gallery" class="gallery"></section>

<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <span class="prev" onclick="showPrev()">‹</span>
  <img id="lightbox-img">
  <h3 id="lightbox-title"></h3>
  <span class="next" onclick="showNext()">›</span>
</div>

<footer>
  <p>© 2026 Santosh Menon</p>
  <p>Artwork done on 8 x 10 canvas on GSM paper using Watercolor</p>
  <p>Made with ❤️ and watercolor</p>
</footer>

<script>
  const repoApiUrl = "https://api.github.com/repos/sammenon/Paintings/contents/";

  let images = [];
  let currentIndex = 0;

  function formatTitle(filename) {
    return filename
      .replace(/\.[^/.]+$/, "")
      .replace(/[-_]/g, " ");
  }

  fetch(repoApiUrl)
    .then(response => response.json())
    .then(files => {
      images = files
        .filter(file => /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name))
        .map(file => ({
          name: file.name,
          url: file.download_url
        }));

      buildGallery();
    });

  function buildGallery() {
    const gallery = document.getElementById("gallery");

    images.forEach((image, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${image.url}" alt="${formatTitle(image.name)}" onclick="openLightbox(${index})">
        <h3>${formatTitle(image.name)}</h3>
        <p class="details">8 x 10 canvas • GSM paper • Watercolor</p>
        <span class="tag">Available</span>
        <a class="buy" href="mailto:?subject=Painting Inquiry - ${formatTitle(image.name)}">Contact to Buy</a>
      `;

      gallery.appendChild(card);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById("lightbox").classList.add("active");
  }

  function updateLightbox() {
    const image = images[currentIndex];
    document.getElementById("lightbox-img").src = image.url;
    document.getElementById("lightbox-title").innerText = formatTitle(image.name);
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }

  function showPrev() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateLightbox();
  }

  function showNext() {
    currentIndex = (currentIndex + 1) % images.length;
    updateLightbox();
  }
</script>

</body>
</html>
