<!DOCTYPE html>
<html>
<head>
  <title>Santosh Menon | Paintings</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    header, footer {
      background: #000;
      text-align: center;
      padding: 20px;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
      border-radius: 8px;
    }

    .card h3 {
      text-align: center;
      margin: 10px 0;
    }

    .details {
      text-align: center;
      color: #aaa;
      font-size: 13px;
    }

    .tag {
      display: block;
      margin: 8px auto;
      padding: 5px 12px;
      border-radius: 999px;
      width: fit-content;
      font-size: 12px;
      background: #1f7a3f;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }

    .lightbox.active {
      display: flex;
    }

    .close {
      position: fixed;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Santosh Menon's Paintings 🎨</h1>
</header>

<section class="hero">
  <h2>My Art Gallery</h2>
  <p>All paintings auto-loaded from GitHub</p>
</section>

<section class="gallery" id="gallery"></section>

<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<footer>
  <p>© 2026 Santosh Menon</p>
  <p>Artwork done on 8 x 10 canvas on GSM paper using Watercolor</p>
</footer>

<script>
  const images = [
    "20260404_065908.jpg",
    "Ganga.jpeg",
    "Krishna.jpg",
    "Matsyaavatar.jpeg",
    "Narasimhamurthy.jpeg",
    "Shri Ram Hanuman.jpeg",
    "Vanamali Krishna.jpeg",
    "Varahamurthy.jpeg",
    "kalki.jpg"
  ];

  const gallery = document.getElementById("gallery");

  images.forEach((img, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${img}" onclick="openLightbox('${img}')">
      <h3>${img.replace(/\.[^/.]+$/, "")}</h3>
      <p class="details">8 x 10 canvas • GSM paper • Watercolor</p>
      <span class="tag">Available</span>
    `;

    gallery.appendChild(card);
  });

  function openLightbox(src) {
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightbox-img").src = src;
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }
</script>

</body>
</html>
