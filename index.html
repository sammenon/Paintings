<!DOCTYPE html>
<html>
<head>
  <title>Santosh Menon | Paintings</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3ed;
      color: #222;
    }

    /* HEADER */
    header {
      background: #111;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
      text-align: center;
    }

    /* FOOTER */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 30px 20px;
      margin-top: 40px;
    }

    footer p {
      margin: 5px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Santosh Menon</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Gallery</a>
      <a href="#">About</a>
    </nav>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h2>My Paintings 🎨</h2>
    <p>Indian-inspired watercolor artwork</p>
  </div>

  <!-- GALLERY -->
  <section class="gallery">
    <div class="card">
      <img src="20260404_065908.jpg">
      <div class="card-content">
        <h3>Artwork 1</h3>
      </div>
    </div>

    <div class="card">
      <img src="Krishna.jpg">
      <div class="card-content">
        <h3>Krishna</h3>
      </div>
    </div>

    <div class="card">
      <img src="kalki.jpg">
      <div class="card-content">
        <h3>Kalki</h3>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Santosh Menon</p>
    <p>Made with ❤️ and watercolor</p>
  </footer>

</body>
</html>
